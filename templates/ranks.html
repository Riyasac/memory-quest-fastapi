<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.52), rgba(0, 0, 0, 0.52)), url("{{url_for('static', path='/bg.gif')}}");
            background-size: cover;
            background-position: top;
            color: white;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 1120px;
            margin: 0 auto 18px auto;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand img {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .brand h1 {
            margin: 0;
            font-size: 1.55rem;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg,#00ff7f,#4b0082);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
        }
        .hint {
            max-width: 1120px;
            margin: 0 auto 18px auto;
            background: rgba(0,0,0,0.45);
            border-radius: 10px;
            padding: 10px 14px;
        }
        .ranks-grid {
            max-width: 1120px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px;
        }
        .rank-card {
            background: rgba(20, 20, 20, 0.78);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .rank-badge {
            font-size: 1.4em;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .rank-title {
            font-size: 1.05em;
            font-weight: bold;
        }
        .rank-status {
            margin-top: 8px;
            font-size: 0.92em;
            color: #e0e0e0;
        }
    </style>
    <link rel="icon" href="{{url_for('static', path='/logo.png')}}" type="image/x-icon">
</head>
<body>
    <script src="{{url_for('static', path='/script.js')}}"></script>
    <div class="top-bar">
        <div class="brand">
            <img src="{{url_for('static', path='/logo.png')}}" alt="Memory Quest logo">
            <h1>Leaderboard</h1>
        </div>
        <div class="actions">
            <button onclick="goToProfile()">Profile</button>
            <button onclick="goToAbout()">About</button>
            <button onclick="goToLevels()">🏠 Levels</button>
            <button onclick="logOut()">Logout</button>
        </div>
    </div>

    <div class="hint" id="hintText">Top Ranking</div>
    <div class="ranks-grid" id="ranksGrid"></div>

    <script>
        init();
        loadRanks();

        async function loadRanks() {
            try {
                const res = await apiFetch("/game/leaderboard");
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || "Could not load leaderboard");
                }

                const gridEl = document.getElementById("ranksGrid");
                gridEl.innerHTML = "";
                if (!data.length) {
                    document.getElementById("hintText").textContent = "No completed games yet.";
                    return;
                }

                for (const entry of data) {
                    const card = document.createElement("div");
                    card.className = "rank-card";
                    card.innerHTML = `
                        <div class="rank-badge">#${entry.rank}</div>
                        <div class="rank-title">${entry.player_name}</div>
                        <div class="rank-status">Level ${entry.level} | Moves ${entry.moves}</div>
                        <div class="rank-status">Time: ${Math.round(entry.time)}s</div>
                    `;
                    gridEl.appendChild(card);
                }
            } catch (error) {
                document.getElementById("hintText").textContent = "Failed to load leaderboard";
            }
        }
    </script>
</body>
</html>
